<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Xem Video 360 Độ</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
        /* Giao diện nút bấm cấp quyền và thông báo */
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            text-align: center;
            font-family: sans-serif;
        }
        .btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.9);
            color: black;
        }
        #permission-btn {
            display: none; /* Chỉ hiển thị trên iOS nếu cần */
        }
    </style>
</head>
<body>

    <a-scene loading-screen="dotsColor: white; backgroundColor: black">
        
        <a-assets>
            <video id="video360" 
                   src="https://bitmovin-a.akamaihd.net/content/playhouse-vr/progressive.mp4" 
                   autoplay 
                   loop 
                   muted 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true"></a-entity>

        <a-videosphere src="#video360" rotation="0 -90 0"></a-videosphere>

    </a-scene>

    <div id="ui-container">
        <button id="permission-btn" class="btn">Kích hoạt Cảm biến (iOS)</button>
        <button id="play-btn" class="btn">Phát / Tạm dừng</button>
    </div>

    <script>
        const video = document.querySelector('#video360');
        const playBtn = document.querySelector('#play-btn');
        const permissionBtn = document.querySelector('#permission-btn');

        // 1. Xử lý nút Phát/Tạm dừng (Trình duyệt chặn tự động phát video có tiếng)
        playBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                video.muted = false; // Bật âm thanh sau khi user tương tác
                playBtn.innerText = "Tạm dừng";
            } else {
                video.pause();
                playBtn.innerText = "Phát Video";
            }
        });

        // 2. Yêu cầu quyền truy cập cảm biến (Bắt buộc riêng đối với iOS 13+)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            // Hiển thị nút cấp quyền nếu là thiết bị iOS
            permissionBtn.style.display = 'inline-block';
            
            permissionBtn.addEventListener('click', () => {
                DeviceOrientationEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            permissionBtn.style.display = 'none';
                            // Tải lại scene để cập nhật cảm biến
                            document.querySelector('a-scene').components['look-controls'].setupControls();
                        } else {
                            alert('Bạn đã từ chối quyền truy cập cảm biến xoay!');
                        }
                    })
                    .catch(console.error);
            });
        }
    </script>
</body>
</html>
